<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>xo Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>xo Language Word Generator</h1>

    <nav class="page-nav">
      <a class="page-nav-link" href="dictionary.html">Dictionary</a>
    </nav>

    <section class="controls" aria-label="Generation settings">
      <div class="controls-left">
        <div class="control-item">
          <label for="minSyllables">Min syllables</label>
          <input id="minSyllables" type="number" min="1" max="12" value="1">
        </div>
        <div class="control-item">
          <label for="maxSyllables">Max syllables</label>
          <input id="maxSyllables" type="number" min="1" max="12" value="3">
        </div>
      </div>
    </section>

    <button id="generateBtn" class="generate-btn" type="button">Generate</button>

    <section class="results-section" aria-live="polite">
      <div class="results-header">
        <h2>Generated Words</h2>
        <button id="clearAllBtn" class="clear-all-btn" type="button">clear all</button>
      </div>
      <ol id="results" class="results-list"></ol>
    </section>
  </main>

  <script src="aws-config.js"></script>
  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
